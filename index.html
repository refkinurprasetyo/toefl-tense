<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL Tense Mastery — Kuasai 12 Tenses sampai Level Ujian</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0b0f24; --bg2:#12183a; --card:#181f47; --card2:#212a5c; --card3:#2b356e;
  --accent:#4f7cff; --accent2:#8a5cff; --teal:#22d3c5; --good:#2ee6a6; --bad:#ff6b6b;
  --text:#eef1ff; --muted:#96a0d4; --line:#2e3872; --gold:#ffd166; --pink:#ff7eb6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;line-height:1.6;color:var(--text);
  background:radial-gradient(1000px 500px at 85% -8%,#2a2f78 0%,transparent 55%),var(--bg);display:flex;min-height:100vh}
a{color:var(--accent)}
#sidebar{width:300px;flex-shrink:0;background:linear-gradient(180deg,var(--bg2),#0c1026);border-right:1px solid var(--line);
  height:100vh;position:sticky;top:0;overflow-y:auto;padding:20px 14px}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:6px;padding:0 6px}
.brand .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px}
.brand h1{font-size:16px;line-height:1.15}
.brand p{font-size:11px;color:var(--muted)}
.progwrap{margin:14px 6px 6px;font-size:12px;color:var(--muted)}
.progbar{height:8px;background:#0a0e26;border-radius:99px;overflow:hidden;margin-top:6px;border:1px solid var(--line)}
.progbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--accent));transition:width .5s}
.navgroup{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin:16px 8px 5px;font-weight:700}
.navlist{list-style:none}
.navlist li{margin:2px 0}
.navlist button{width:100%;text-align:left;background:transparent;border:1px solid transparent;color:var(--text);
  padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:.15s}
.navlist button:hover{background:var(--card)}
.navlist button.active{background:linear-gradient(90deg,rgba(79,124,255,.28),rgba(138,92,255,.14));border-color:var(--accent)}
.navlist .num{width:22px;height:22px;flex-shrink:0;border-radius:6px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.navlist button.done .num{background:var(--good);color:#06231a}
#wrap{flex:1;min-width:0;display:flex;flex-direction:column}
#main{flex:1;min-width:0;padding:30px 42px 90px;max-width:1000px}
.mobtop{display:none}
.kicker{color:var(--teal);font-weight:700;font-size:12.5px;letter-spacing:.06em}
h2.title{font-size:29px;margin:2px 0 4px}
.subtitle{color:var(--muted);font-size:15px}
.badge{display:inline-block;font-size:11px;background:var(--card2);border:1px solid var(--line);padding:2px 9px;border-radius:99px;margin-left:8px;color:var(--gold);vertical-align:middle}
.section-title{font-size:18px;margin:22px 0 12px;display:flex;align-items:center;gap:9px;font-weight:700}
.section-title .ic{width:29px;height:29px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px}
/* Formula box */
.formula{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 20px;margin:10px 0}
.formula .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:7px 0;border-bottom:1px dashed var(--line);font-size:15px}
.formula .row:last-child{border-bottom:none}
.formula .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;min-width:74px;text-align:center}
.tag.pos{background:rgba(46,230,166,.16);color:var(--good)}
.tag.neg{background:rgba(255,107,107,.16);color:var(--bad)}
.tag.qst{background:rgba(255,209,102,.16);color:var(--gold)}
.formula code{background:#0c1130;border:1px solid var(--line);border-radius:7px;padding:3px 9px;font-size:14px;color:#dfe4ff;font-family:"SF Mono",Consolas,monospace}
.formula .hl{color:var(--teal);font-weight:700}
/* Timeline */
.timeline{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin:12px 0}
.tl-bar{position:relative;height:4px;background:var(--line);border-radius:99px;margin:34px 12px 30px}
.tl-now{position:absolute;top:-13px;width:2px;height:30px;background:var(--pink)}
.tl-now::after{content:"NOW";position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--pink);font-weight:700}
.tl-x{position:absolute;top:-9px;width:22px;height:22px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);transform:translateX(-50%);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.tl-line{position:absolute;top:-1px;height:6px;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:99px;transform:translateY(-1px)}
.tl-label{position:absolute;top:14px;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap}
/* Uses / examples */
.usebox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 20px}
.usebox ul{margin-left:19px}
.usebox li{margin:6px 0;font-size:14.5px}
.usebox li .ex{display:block;color:var(--teal);font-size:13.5px;margin-top:2px}
.signals{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0}
.chip{background:var(--card2);border:1px solid var(--line);border-radius:99px;padding:4px 12px;font-size:13px}
.chip.gold{border-color:rgba(255,209,102,.4);color:var(--gold)}
.exlist .exrow{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 14px;margin:8px 0;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.exlist .en{font-size:15px;font-weight:600}
.exlist .id{color:var(--muted);font-size:13px;margin-top:2px}
.say{background:var(--card2);border:1px solid var(--line);color:var(--accent);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;flex-shrink:0;transition:.15s}
.say:hover{background:var(--accent);color:#fff}
.tip{background:linear-gradient(90deg,rgba(255,209,102,.12),transparent);border:1px solid rgba(255,209,102,.32);border-radius:11px;padding:11px 15px;margin:14px 0;font-size:14px}
.tip b{color:var(--gold)}
.trap{background:linear-gradient(90deg,rgba(255,107,107,.13),transparent);border:1px solid rgba(255,107,107,.32);border-radius:11px;padding:11px 15px;margin:14px 0;font-size:14px}
.trap b{color:var(--bad)}
/* Dialogue */
.dialogue{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px 6px}
.line{display:flex;gap:11px;padding:10px 13px;align-items:flex-start}
.line .who{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff}
.line.a .who{background:linear-gradient(135deg,var(--accent),#3a6bd6)}
.line.b .who{background:linear-gradient(135deg,var(--accent2),#5a3ad6)}
.line .bubble{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:8px 12px;flex:1}
.line .en{font-size:14.5px;font-weight:600;display:flex;gap:8px;justify-content:space-between;align-items:flex-start}
.line .en em{color:var(--teal);font-style:normal;font-weight:700}
.line .id{color:var(--muted);font-size:12.5px;margin-top:3px;display:none}
.dialogue.show-id .line .id{display:block}
.toolbar{display:flex;gap:9px;margin:12px 0;flex-wrap:wrap}
.btn{background:var(--card2);border:1px solid var(--line);color:var(--text);padding:8px 15px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600;transition:.15s}
.btn:hover{border-color:var(--accent);background:var(--card)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none}
.btn.primary:hover{filter:brightness(1.1)}
/* Drill (fill in blank) */
.drill{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 18px;margin:10px 0}
.drill .dq{font-size:15px;margin-bottom:9px}
.drill .dq .blank{display:inline-block;min-width:90px;border-bottom:2px solid var(--accent);color:var(--teal);font-weight:700;text-align:center}
.drill input{background:#0c1130;border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:8px;font-size:14px;width:180px}
.drill input:focus{outline:none;border-color:var(--accent)}
.drill .hint{color:var(--muted);font-size:12.5px;margin-left:8px}
.drill .fb{margin-top:9px;font-size:13.5px;display:none;padding:8px 12px;border-radius:8px}
.drill .fb.show{display:block}
.drill .fb.ok{background:rgba(46,230,166,.14);color:var(--good)}
.drill .fb.no{background:rgba(255,107,107,.14);color:#ffb4b4}
/* Quiz / TOEFL */
.quiz-q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px 20px;margin:13px 0}
.quiz-q .qnum{font-size:12px;color:var(--teal);font-weight:700}
.quiz-q .qtext{font-size:15.5px;font-weight:600;margin:5px 0 11px}
.quiz-q .qtext u{text-decoration:none;border-bottom:2px dotted var(--muted);padding:0 2px}
.opt{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--text);
  padding:10px 15px;border-radius:10px;margin:6px 0;cursor:pointer;font-size:14.5px;transition:.15s}
.opt:hover{border-color:var(--accent)}
.opt.correct{background:rgba(46,230,166,.18);border-color:var(--good)}
.opt.wrong{background:rgba(255,107,107,.15);border-color:var(--bad)}
.opt.disabled{cursor:default;opacity:.9}
.explain{margin-top:9px;font-size:13.5px;color:var(--muted);background:#0c1130;border-radius:9px;padding:9px 13px;display:none}
.explain.show{display:block}
.result{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--accent);border-radius:14px;padding:18px 22px;margin:16px 0;text-align:center;display:none}
.result.show{display:block}
.result .score{font-size:34px;font-weight:800;color:var(--gold)}
.pager{display:flex;justify-content:space-between;margin-top:34px;gap:12px}
.pager .btn{flex:1;padding:13px}
.markdone{background:linear-gradient(135deg,var(--good),#1cb583);border:none;color:#06231a;font-weight:800}
/* Home */
.hero{background:linear-gradient(135deg,rgba(79,124,255,.2),rgba(138,92,255,.12));border:1px solid var(--line);border-radius:20px;padding:34px 32px;margin-bottom:20px}
.hero h2{font-size:31px}
.hero p{color:var(--muted);font-size:16px;margin-top:8px;max-width:660px}
.mapgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.mapcell{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;transition:.15s}
.mapcell:hover{border-color:var(--accent);transform:translateY(-2px)}
.mapcell .t{font-weight:700;font-size:14px}
.mapcell .f{color:var(--teal);font-size:12px;font-family:monospace;margin-top:4px}
.maphdr{grid-column:1/-1;color:var(--gold);font-weight:700;font-size:13px;margin-top:8px;letter-spacing:.04em}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:16px 0}
.feat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px}
.feat .ic{font-size:21px}.feat h4{margin:7px 0 3px;font-size:14.5px}.feat p{color:var(--muted);font-size:12.5px}
/* timer */
.timerbar{position:sticky;top:0;z-index:5;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.timerbar .clock{font-size:20px;font-weight:800;font-family:monospace;color:var(--gold)}
@media(max-width:860px){
  body{flex-direction:column}
  #sidebar{width:100%;height:auto;position:relative;display:none}
  #sidebar.open{display:block}
  #main{padding:16px 15px 80px}
  .mapgrid{grid-template-columns:1fr}
  .mobtop{display:flex;align-items:center;gap:12px;padding:12px 15px;background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .mobtop button{background:var(--card2);border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:9px;font-size:18px;cursor:pointer}
  h2.title{font-size:23px}
}
/* ===== AUTH / TOPBAR / DASHBOARD ===== */
body.pre-auth #sidebar,body.pre-auth #wrap{display:none!important}
#authgate{display:none;position:fixed;inset:0;z-index:100;overflow:auto;
  background:radial-gradient(900px 500px at 80% -10%,#2a2f78 0%,transparent 55%),var(--bg);
  align-items:center;justify-content:center;padding:24px}
body.pre-auth #authgate{display:flex}
.authcard{width:100%;max-width:430px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:32px 30px}
.authcard .logo{width:56px;height:56px;border-radius:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;margin-bottom:14px}
.authcard h2{font-size:23px}
.authcard p.sub{color:var(--muted);font-size:14px;margin:4px 0 20px}
.authcard label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;font-weight:600}
.authcard input{width:100%;background:#0c1130;border:1px solid var(--line);color:var(--text);padding:12px 14px;border-radius:11px;font-size:15px}
.authcard input:focus{outline:none;border-color:var(--accent)}
.authcard .bigbtn{width:100%;margin-top:20px;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.authcard .bigbtn:hover{filter:brightness(1.08)}
.authcard .err{color:var(--bad);font-size:13.5px;margin-top:12px;min-height:18px}
.authcard .demo{margin-top:20px;padding-top:16px;border-top:1px solid var(--line);font-size:13px;color:var(--muted)}
.authcard .demo b{color:var(--gold)}
.authcard .demo .acc{background:#0c1130;border:1px solid var(--line);border-radius:9px;padding:7px 11px;margin:6px 0;display:flex;justify-content:space-between;cursor:pointer}
.authcard .demo .acc:hover{border-color:var(--accent)}
.authcard .demo .acc code{color:var(--teal)}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.topbar .sp{flex:1}
.topbar .uname{font-weight:700;font-size:14px}
.topbar .rolechip{font-size:11px;padding:2px 9px;border-radius:99px;margin-left:7px}
.rolechip.student{background:rgba(46,230,166,.16);color:var(--good)}
.rolechip.teacher{background:rgba(255,126,182,.16);color:var(--pink)}
.topbar button{background:var(--card2);border:1px solid var(--line);color:var(--text);padding:7px 13px;border-radius:9px;font-size:13px;cursor:pointer}
.topbar button:hover{border-color:var(--accent)}
.topbar .mob{display:none}
/* dashboard */
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:16px 0}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.stat .big{font-size:30px;font-weight:800;color:var(--gold)}
.stat .lab{color:var(--muted);font-size:13px;margin-top:2px}
.ring{--p:0;width:96px;height:96px;flex-shrink:0;border-radius:50%;background:conic-gradient(var(--teal) calc(var(--p)*1%),#0c1130 0);display:flex;align-items:center;justify-content:center}
.ring .inner{width:72px;height:72px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .inner b{font-size:21px;line-height:1}
.ring .inner span{font-size:10px;color:var(--muted)}
.stat.ringcard{grid-column:span 2}
.ringrow{display:flex;gap:16px;align-items:center}
.ringrow .rt{min-width:0}
.ringrow .rt .big{font-size:26px}
@media(max-width:640px){.stat.ringcard{grid-column:auto}}
.chartbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:14px 0}
.chartbox h3{font-size:15px;margin-bottom:10px}
.badges{display:flex;flex-wrap:wrap;gap:9px;margin:6px 0}
.badge2{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:9px 13px;font-size:13px;display:flex;align-items:center;gap:8px}
.badge2.on{border-color:var(--gold);background:linear-gradient(90deg,rgba(255,209,102,.14),transparent)}
.badge2.off{opacity:.45}
.dtable{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.dtable th,.dtable td{padding:10px 13px;text-align:left;border-bottom:1px solid var(--line)}
.dtable th{background:var(--card2);color:var(--gold);font-size:12.5px}
.dtable tr:last-child td{border-bottom:none}
.dtable .barmini{height:7px;background:#0c1130;border-radius:99px;overflow:hidden;min-width:70px}
.dtable .barmini>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--accent))}
.dtable .rowbtn{color:var(--accent);cursor:pointer;font-weight:600}
.dtable .rowbtn:hover{text-decoration:underline}
@media(max-width:860px){.topbar .mob{display:inline-block}}
/* ===== LATIHAN (EXERCISE) ===== */
.exhead{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 16px;position:sticky;top:0;z-index:6;margin-bottom:14px}
.exhead .clock{font-size:22px;font-weight:800;font-family:monospace;color:var(--gold)}
.exhead .clock.warn{color:var(--bad)}
.exhead .pagechip{font-size:12px;color:var(--muted)}
.expage{display:none}
.expage.active{display:block;animation:fade .25s}
.opt.sel{background:linear-gradient(90deg,rgba(79,124,255,.28),rgba(138,92,255,.16));border-color:var(--accent)}
.exfill{width:100%;max-width:340px;background:#0c1130;border:1px solid var(--line);color:var(--text);padding:10px 13px;border-radius:9px;font-size:15px}
.exfill:focus{outline:none;border-color:var(--accent)}
.exnav{display:flex;justify-content:space-between;gap:12px;margin-top:18px}
.exnav .btn{flex:1;padding:13px}
.exsubmit{background:linear-gradient(135deg,var(--good),#1cb583);border:none;color:#06231a;font-weight:800}
.exlaunch{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;background:linear-gradient(90deg,rgba(79,124,255,.16),rgba(138,92,255,.08));border:1px solid var(--accent);border-radius:14px;padding:16px 20px;margin:18px 0}
.exlaunch .meta{font-size:13px;color:var(--muted)}
.exlaunch .lastscore{font-weight:800;color:var(--gold);font-size:15px}
.exrev{border-left:3px solid var(--line);padding:9px 13px;margin:8px 0;border-radius:0 8px 8px 0;background:#0e1230;font-size:14px}
.exrev.ok{border-left-color:var(--good)}
.exrev.no{border-left-color:var(--bad)}
.exrev .qn{font-size:12px;color:var(--muted)}
.exrev .ans{font-size:13px;margin-top:3px}
.exrev .ans b.good{color:var(--good)}
.exrev .ans b.bad{color:#ffb4b4}
</style>
</head>
<body class="pre-auth">
<div id="authgate"><div class="authcard" id="authcard"></div></div>
<aside id="sidebar">
  <div class="brand">
    <div class="logo">T</div>
    <div><h1>TOEFL Tense Mastery</h1><p>12 tenses → level ujian</p></div>
  </div>
  <div class="progwrap"><span id="progtext">0 selesai</span>
    <div class="progbar"><i id="progfill"></i></div></div>
  <div id="nav"></div>
</aside>
<div id="wrap">
  <div class="topbar">
    <button class="mob" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <span class="uname" id="tbname">—</span><span class="rolechip" id="tbrole"></span>
    <span class="sp"></span>
    <button onclick="doLogout()">Keluar</button>
  </div>
  <main id="main"></main>
</div>
<script>
/* ============ DATA: 12 TENSES ============ */
/* timeline: array of markers {pos:0-100, type:'point'|'range', from,to, label} ; now default at 50 */
const TENSES=[
{

  let html=`<ul class="navlist">
    <li><button class="${state.current==='home'?'active':''}" data-go="home"><span class="num">🏠</span> Beranda & Peta</button></li>
    <li><button class="${state.current==='achievements'?'active':''}" data-go="achievements"><span class="num">🏆</span> Pencapaian Saya</button></li>

function timelineHTML(t){
  let markers="";
  t.tl.forEach(m=>{
    if(m.type==='point'){
      markers+=`<div class="tl-x" style="left:${m.pos}%">✕</div>`;
      if(m.l)markers+=`<div class="tl-label" style="left:${m.pos}%">${m.l}</div>`;
    }else{
      markers+=`<div class="tl-line" style="left:${m.from}%;width:${m.to-m.from}%"></div>`;
      if(m.l)markers+=`<div class="tl-label" style="left:${(m.from+m.to)/2}%">${m.l}</div>`;
    }
  });
  return `<div class="timeline"><div class="tl-bar">
    <div class="tl-now" style="left:50%"></div>${markers}
    <div class="tl-label" style="left:6%">masa lalu ⟵</div>
    <div class="tl-label" style="left:94%">⟶ masa depan</div>
  </div><p style="color:var(--muted);font-size:13px;text-align:center;margin-top:6px">${t.tlnote}</p></div>`;
}

function checkDrill(uid,i){
  const box=document.querySelector(`.drill[data-di="${i}"]`);
  const inp=box.querySelector("input");
  const fb=box.querySelector(".fb");
  const data=(uid.startsWith('t')?TENSES.find(x=>'t'+x.id===uid):null).drill[i];
  const val=inp.value.trim().toLowerCase().replace(/\s+/g,' ');
  const accepted=data.a.map(x=>x.toLowerCase().replace(/\.\.\./g,' ').replace(/\s+/g,' '));
  const ok=accepted.some(x=>x===val);
  fb.className="fb show "+(ok?"ok":"no");
  fb.innerHTML=ok?`✅ Benar! <b>${data.a[0]}</b>`:`❌ Belum tepat. Jawaban: <b>${data.a[0]}</b>`;
  inp.style.borderColor=ok?"var(--good)":"var(--bad)";
  const t=TENSES.find(x=>'t'+x.id===uid);
  if(!state.drills[uid])state.drills[uid]={correct:{},total:t?t.drill.length:0};
  if(ok)state.drills[uid].correct[i]=true; else delete state.drills[uid].correct[i];
  save();
}

function quizHTML(uid,i,q,total){
  const isErr=q.type==='err';
  let qtext;
  if(isErr){ qtext=q.parts.map((p,j)=>`<u>(${String.fromCharCode(65+j)}) ${p}</u>`).join(" "); }
  else{ qtext=q.q; }
  const opts=isErr?q.parts.map((p,j)=>`(${String.fromCharCode(65+j)})`):q.o;
  return `<div class="quiz-q" data-qi="${i}">
    <div class="qnum">${isErr?'Error Identification':'Soal'} ${i+1}${total?' / '+total:''}</div>
    <div class="qtext">${qtext}</div>
    ${isErr?'<p style="color:var(--muted);font-size:13px;margin-bottom:6px">Pilih bagian yang salah:</p>':''}
    ${opts.map((op,j)=>`<button class="opt" onclick="answer('${uid}',${i},${j})">${op}</button>`).join("")}

const answered={};
function getQuizArr(uid){
  if(uid==='toefl')return TOEFL;
  if(uid.startsWith('t'))return TENSES.find(x=>'t'+x.id===uid).quiz;
  return ADVANCED.find(x=>x.id===uid).quiz;
}
function answer(uid,qi,ch){
  const key=uid+"_"+qi;
  if(answered[key]!==undefined)return;
  const arr=getQuizArr(uid); const q=arr[qi]; answered[key]=ch;
  const box=document.querySelectorAll(`#quizbox .quiz-q, #toeflbox .quiz-q`)[0]; // fallback
  const boxes=document.querySelectorAll(`.quiz-q[data-qi="${qi}"]`);
  const b=boxes[boxes.length-1];
  const opts=b.querySelectorAll(".opt");
  opts.forEach((o,j)=>{o.classList.add("disabled");if(j===q.a)o.classList.add("correct");if(j===ch&&ch!==q.a)o.classList.add("wrong");});
  const ex=b.querySelector(".explain");
  ex.innerHTML=(ch===q.a?"✅ Benar! ":"❌ Kurang tepat. ")+q.e;
  ex.classList.add("show");
  // result
  const answeredCount=Object.keys(answered).filter(k=>k.startsWith(uid+"_")).length;
  if(answeredCount===arr.length){
    let correct=0;arr.forEach((qq,j)=>{if(answered[uid+"_"+j]===qq.a)correct++;});
    const pct=Math.round(correct/arr.length*100);
    const res=uid==='toefl'?$("#tresult"):$("#qresult");
    if(res){res.classList.add("show");
      (uid==='toefl'?$("#tscore"):$("#qscore")).textContent=`${correct}/${arr.length} (${pct}%)`;
      const msg=uid==='toefl'?$("#tmsg"):$("#qmsg");
      msg.innerHTML=pct>=85?"🎉 Luar biasa! Level TOEFL. Lanjutkan!":pct>=60?"👍 Bagus, tinjau soal yang salah.":"💪 Ulangi materi tense terkait.";
      res.scrollIntoView({behavior:"smooth",block:"nearest"});
    }
    state.scores[uid]={correct,total:arr.length,ts:Date.now()};
    if(uid!=='home'){state.done[uid]=true;}
    save();renderNav();
  }
}

/* ============ LATIHAN (EXERCISE) ENGINE ============ */
const EX_PER_Q=45; // detik per soal → timer proporsional
let exState={key:null,ans:{},page:0,timer:null,left:0,done:false};
function startExercise(key){ state.current='ex:'+key; render(); scrollTo(0,0); }
function exQHTML(q,gi){
  const num=`<div class="qnum">Soal ${gi+1}</div>`;
  if(q.t==='fill'){
    return `<div class="quiz-q">${num}<div class="qtext">${q.q.replace('___','<span class="blank">_____</span>')}</div>
      <input class="exfill" data-exi="${gi}" type="text" placeholder="ketik jawaban..."></div>`;
  }
  const isErr=q.t==='err';
  const qtext=isErr?q.p.map((p,j)=>`<u>(${String.fromCharCode(65+j)}) ${p}</u>`).join(' '):q.q;
  const opts=isErr?q.p.map((p,j)=>`(${String.fromCharCode(65+j)})`):q.o;
  const hint=isErr?'<p style="color:var(--muted);font-size:13px;margin:4px 0 6px">Pilih bagian yang salah:</p>':'';
  const btns=opts.map((op,j)=>`<button class="opt" data-exi="${gi}" data-j="${j}" onclick="exPick(${gi},${j})">${op}</button>`).join('');
  return `<div class="quiz-q">${num}<div class="qtext">${qtext}</div>${hint}${btns}</div>`;
}
function renderExercise(key){
  const m=$("#main");const qs=EXERCISES[key];
  if(!qs){m.innerHTML='<p>Latihan tidak ditemukan.</p>';return;}
  exState={key,ans:{},page:0,timer:null,left:qs.length*EX_PER_Q,done:false};
  const perPage=Math.ceil(qs.length/2);
  const pages=[qs.slice(0,perPage),qs.slice(perPage)];
  const mins=Math.ceil(qs.length*EX_PER_Q/60);
  let html=`<div class="kicker">LATIHAN SOAL</div>
    <h2 class="title">📝 ${moduleName(key)}</h2>
    <p class="subtitle">${qs.length} soal • 2 halaman • waktu ${mins} menit. Jawab semua lalu tekan "Selesai & Nilai". Nilai tersimpan & dibandingkan guru.</p>
    <div class="exhead"><div><b>${qs.length} soal</b> <span class="pagechip" id="expageinfo">Halaman 1 dari 2</span></div><div class="clock" id="exclock">${mins}:00</div></div>`;
  pages.forEach((pg,pi)=>{
    html+=`<div class="expage ${pi===0?'active':''}" data-page="${pi}">`;
    pg.forEach((q,li)=>{ html+=exQHTML(q,pi*perPage+li); });
    html+=`</div>`;
  });
  html+=`<div class="exnav">
    <button class="btn" id="exprev" onclick="exGoPage(-1)" disabled style="opacity:.4">← Sebelumnya</button>
    <button class="btn primary" id="exnext" onclick="exGoPage(1)">Halaman 2 →</button>
    <button class="btn exsubmit" id="exfinish" onclick="exSubmit(false)" style="display:none">✅ Selesai & Nilai</button>
  </div>
  <div style="text-align:center;margin-top:12px"><button class="btn" onclick="go('${key}')">✕ Keluar tanpa menilai</button></div>`;
  m.innerHTML=html;exStartTimer();
}
function exPick(gi,j){
  exState.ans[gi]=j;
  document.querySelectorAll('.opt[data-exi="'+gi+'"]').forEach(b=>b.classList.toggle('sel', +b.dataset.j===j));
}
function exGoPage(dir){
  const np=exState.page+dir;if(np<0||np>1)return;exState.page=np;
  document.querySelectorAll('.expage').forEach(p=>p.classList.toggle('active', +p.dataset.page===np));
  $("#expageinfo").textContent='Halaman '+(np+1)+' dari 2';
  const prev=$("#exprev");prev.disabled=np===0;prev.style.opacity=np===0?.4:1;
  $("#exnext").style.display=np===1?'none':'';
  $("#exfinish").style.display=np===1?'':'none';
  scrollTo(0,0);
}
function exStartTimer(){
  if(exState.timer)clearInterval(exState.timer);
  const upd=()=>{const c=$("#exclock");if(!c){clearInterval(exState.timer);return;}
    const mm=Math.floor(exState.left/60),ss=exState.left%60;
    c.textContent=mm+':'+(ss<10?'0':'')+ss;
    if(exState.left<=30)c.classList.add('warn');
    if(exState.left<=0){clearInterval(exState.timer);exSubmit(true);}};
  upd();exState.timer=setInterval(()=>{exState.left--;upd();},1000);
}
function exSubmit(timeUp){
  if(exState.done)return;exState.done=true;
  if(exState.timer){clearInterval(exState.timer);exState.timer=null;}
  const key=exState.key,qs=EXERCISES[key];
  document.querySelectorAll('.exfill').forEach(inp=>{exState.ans[+inp.dataset.exi]=inp.value;});
  let correct=0;const rev=[];
  qs.forEach((q,i)=>{
    let ok=false,your='(kosong)',ansTxt='';
    if(q.t==='fill'){
      const val=String(exState.ans[i]||'').trim().toLowerCase().replace(/\s+/g,' ');
      const acc=q.a.map(x=>x.toLowerCase().replace(/\.\.\./g,' ').replace(/\s+/g,' '));
      ok=val!==''&&acc.some(x=>x===val);your=exState.ans[i]?exState.ans[i]:'(kosong)';ansTxt=q.a[0];
    }else{
      const ch=exState.ans[i];ok=ch===q.a;
      const opts=q.t==='err'?q.p.map((p,j)=>'('+String.fromCharCode(65+j)+')'):q.o;
      your=(ch!==undefined&&opts[ch]!==undefined)?opts[ch]:'(kosong)';ansTxt=opts[q.a];
    }
    if(ok)correct++;rev.push({i,ok,your,ansTxt,e:q.e,q});
  });
  const total=qs.length,pct=Math.round(correct/total*100);
  const timeUsed=total*EX_PER_Q-Math.max(0,exState.left);
  state.exercises[key]={correct,total,pct,ts:Date.now(),timeUsed};
  save();
  renderExResult(key,correct,total,pct,rev,timeUp,timeUsed);
}
function renderExResult(key,correct,total,pct,rev,timeUp,timeUsed){
  const m=$("#main");
  const msg=pct>=85?'🎉 Luar biasa! Penguasaan sangat baik.':pct>=60?'👍 Bagus — tinjau soal yang salah.':'💪 Pelajari lagi materi modulnya, lalu ulangi.';
  const mm=Math.floor(timeUsed/60),ss=timeUsed%60;
  let html=`<div class="kicker">HASIL LATIHAN</div><h2 class="title">📝 ${moduleName(key)}</h2>
    ${timeUp?'<div class="trap"><b>Waktu habis</b> — jawaban otomatis dikumpulkan.</div>':''}
    <div class="result show" style="position:static"><div class="score">${correct}/${total} (${pct}%)</div><div>${msg}</div>
    <div style="color:var(--muted);font-size:13px;margin-top:6px">Waktu terpakai: ${mm}m ${ss}s • Nilai tersimpan & terpantau guru</div></div>
    <div class="section-title"><span class="ic">🔍</span> Pembahasan</div>`;
  rev.forEach(r=>{
    const qtext=r.q.t==='err'?r.q.p.map((p,j)=>'('+String.fromCharCode(65+j)+') '+p).join(' '):r.q.q.replace('___','_____');
    html+=`<div class="exrev ${r.ok?'ok':'no'}"><div class="qn">Soal ${r.i+1} — ${r.ok?'✓ benar':'✗ salah'}</div>
      <div style="font-size:14px;margin:3px 0">${qtext}</div>
      <div class="ans">Jawaban Anda: <b class="${r.ok?'good':'bad'}">${r.your}</b>${r.ok?'':' • Kunci: <b class="good">'+r.ansTxt+'</b>'}</div>
      <div style="color:var(--muted);font-size:12.5px;margin-top:3px">${r.e}</div></div>`;
  });
  html+=`<div class="exnav"><button class="btn" onclick="go('${key}')">← Kembali ke modul</button>
    <button class="btn primary" onclick="startExercise('${key}')">🔁 Ulangi Latihan</button></div>`;
  m.innerHTML=html;scrollTo(0,0);renderNav();
}

function render(){
  clearInterval(timerInt);destroyCharts();if(exState.timer){clearInterval(exState.timer);exState.timer=null;}
  renderNav();
  const m=$("#main");
  if(state.current.startsWith('ex:')){renderExercise(state.current.slice(3));return;}
  if(PROFILE&&PROFILE.role==='teacher'){
    if(state.current==='teacher'){renderTeacher();return;}
    if(state.current.startsWith('stu:')){renderStudentDetail(state.current.slice(4));return;}
  }
  if(state.current==="achievements"){m.innerHTML=renderAchievements();drawAchievementCharts();return;}
  if(state.current==="home"){m.innerHTML=renderHome();return;}
  if(state.current==="toefl"){m.innerHTML=renderToefl();startTimer();return;}
  if(state.current.startsWith("t")&&/^t\d+$/.test(state.current)){
    m.innerHTML=renderTense(TENSES.find(x=>'t'+x.id===state.current));return;
  }
  const a=ADVANCED.find(x=>x.id===state.current);
  if(a){m.innerHTML=renderAdvanced(a);return;}
  m.innerHTML=renderHome();
}

/* ============ STATS HELPERS ============ */
function allModuleKeys(){return [...TENSES.map(t=>'t'+t.id),...ADVANCED.map(a=>a.id),'toefl'];}
function moduleName(k){
  if(k==='toefl')return 'Simulasi TOEFL';
  if(/^t\d+$/.test(k)){const t=TENSES.find(x=>'t'+x.id===k);return t?t.name:k;}
  const a=ADVANCED.find(x=>x.id===k);return a?a.name:k;
}
function computeStats(st){
  st=st||{};const done=st.done||{},scores=st.scores||{},drills=st.drills||{},exs=st.exercises||{};
  const keys=allModuleKeys();const total=keys.length;
  const completed=keys.filter(k=>done[k]).length;
  let sum=0,n=0;const per=[];
  keys.forEach(k=>{const s=scores[k];const pct=(s&&s.total)?Math.round(s.correct/s.total*100):null;if(pct!==null){sum+=pct;n++;}per.push({key:k,name:moduleName(k),pct});});
  let dC=0,dT=0;Object.keys(drills).forEach(k=>{const d=drills[k];dC+=Object.keys(d.correct||{}).length;dT+=d.total||0;});
  const exKeys=Object.keys(EXERCISES);
  let eSum=0,eN=0;const exPer=[];
  exKeys.forEach(k=>{const e=exs[k];const p=(e&&e.total)?e.pct:null;if(p!==null){eSum+=p;eN++;}exPer.push({key:k,name:moduleName(k),pct:p});});
  const toefl=scores['toefl']?Math.round(scores['toefl'].correct/scores['toefl'].total*100):null;
  return {total,completed,pct:Math.round(completed/total*100),avg:n?Math.round(sum/n):0,quizzesDone:n,per,toefl,drillCorrect:dC,drillTotal:dT,
    exAvg:eN?Math.round(eSum/eN):0,exDone:eN,exTotal:exKeys.length,exPer};
}

function destroyCharts(){chartRefs.forEach(c=>{try{c.destroy();}catch(e){}});chartRefs=[];}
const CO={teal:'#22d3c5',accent:'#4f7cff',accent2:'#8a5cff',gold:'#ffd166',pink:'#ff7eb6',good:'#2ee6a6',line:'#2e3872',muted:'#96a0d4'};
function chartOpts(extra){return Object.assign({responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:CO.muted}}},scales:{x:{ticks:{color:CO.muted,font:{size:10}},grid:{color:CO.line}},y:{beginAtZero:true,max:100,ticks:{color:CO.muted},grid:{color:CO.line}}}},extra||{});}

function drawAchievementCharts(){
  const s=computeStats(state);if(!window.Chart)return;
  const exArr=s.exPer.filter(p=>p.pct!==null);
  const ex=document.getElementById('achExChart');
  if(ex){ if(!exArr.length){ex.parentElement.innerHTML='<p style="color:var(--muted);text-align:center;padding:30px">Belum ada latihan dikerjakan. Buka sebuah modul lalu klik "Mulai Latihan".</p>';}
    else chartRefs.push(new Chart(ex,{type:'bar',data:{labels:exArr.map(p=>p.name),datasets:[{label:'Nilai Latihan (%)',data:exArr.map(p=>p.pct),backgroundColor:CO.gold,borderRadius:6}]},options:chartOpts()})); }
  const done=s.per.filter(p=>p.pct!==null);
  const el=document.getElementById('achChart');if(!el)return;
  if(!done.length){el.parentElement.innerHTML='<p style="color:var(--muted);text-align:center;padding:30px">Belum ada kuis dikerjakan.</p>';return;}
  chartRefs.push(new Chart(el,{type:'bar',data:{labels:done.map(p=>p.name),datasets:[{label:'Skor (%)',data:done.map(p=>p.pct),backgroundColor:CO.teal,borderRadius:6}]},options:chartOpts()}));
}

function renderTeacherNav(){
  let html=`<ul class="navlist"><li><button class="${state.current==='teacher'?'active':''}" data-go="teacher"><span class="num">📊</span> Dashboard</button></li></ul>`;
  html+=`<div class="navgroup">Siswa (${STUDENTS.length})</div><ul class="navlist">`;
  STUDENTS.forEach(s=>{html+=`<li><button class="${state.current==='stu:'+s.uid?'active':''}" data-go="stu:${s.uid}"><span class="num">👤</span> <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name||s.email}</span></button></li>`;});
  html+=`</ul><div class="navgroup">Materi</div><ul class="navlist"><li><button class="${state.current==='home'?'active':''}" data-go="home"><span class="num">📚</span> Lihat Materi</button></li></ul>`;
  $("#nav").innerHTML=html;
  $("#nav").querySelectorAll("button").forEach(b=>b.onclick=()=>{state.current=b.dataset.go;document.getElementById('sidebar').classList.remove('open');render();scrollTo(0,0);});
  $("#progtext").textContent=`${STUDENTS.length} siswa terpantau`;
  $("#progfill").style.width=(STUDENTS.length?100:0)+"%";
}
async function loadStudents(){
  STUDENTS=[];
  try{
    const snap=await db.collection("users").where("role","==","student").get();
    snap.forEach(d=>STUDENTS.push(Object.assign({uid:d.id},d.data())));
    STUDENTS.sort((a,b)=>(a.name||a.email||'').localeCompare(b.name||b.email||''));
  }catch(e){console.warn("loadStudents",e);}
}

function fillLogin(e,p){$("#li_email").value=e;$("#li_pw").value=p;}
function doLogin(){
  const e=$("#li_email").value.trim(),p=$("#li_pw").value;
  if(!e||!p){$("#li_err").textContent="Isi email dan password.";return;}
  $("#li_err").textContent="Memproses…";
  auth.signInWithEmailAndPassword(e,p).catch(err=>{
    const map={'auth/invalid-credential':'Email atau password salah.','auth/user-not-found':'Akun tidak ditemukan.','auth/wrong-password':'Password salah.','auth/invalid-email':'Format email tidak valid.','auth/too-many-requests':'Terlalu banyak percobaan. Coba lagi nanti.'};
    $("#li_err").textContent=map[err.code]||('Gagal masuk: '+err.message);
  });
}
function doLogout(){if(auth)auth.signOut().then(()=>location.reload());}
async function onLogin(user){
  CU=user;
  try{const s=localStorage.getItem(cacheKey());if(s){const c=JSON.parse(s);state.done=c.done||{};state.scores=c.scores||{};state.drills=c.drills||{};state.exercises=c.exercises||{};}}catch(e){}
  let role='student',name=user.email;
  try{
    const doc=await db.collection("users").doc(user.uid).get();
    if(doc.exists){const d=doc.data();role=d.role||'student';name=d.name||user.email;
      state.done=d.done||state.done;state.scores=d.scores||state.scores;state.drills=d.drills||state.drills;state.exercises=d.exercises||state.exercises;}
    else{await db.collection("users").doc(user.uid).set({name:user.email,email:user.email,role:'student',createdAt:Date.now()},{merge:true});}
  }catch(e){console.warn("profil",e);}
  PROFILE={name,email:user.email,role};
  if(role==='teacher')await loadStudents();
  document.body.classList.remove('pre-auth');
  $("#tbname").textContent=name;
  $("#tbrole").textContent=role==='teacher'?'Guru':'Siswa';
  $("#tbrole").className="rolechip "+(role==='teacher'?'teacher':'student');
  state.current=role==='teacher'?'teacher':'home';
  render();
}
/* seeding akun contoh (dipanggil manual via console: seedDemo()) */
async function seedDemo(){
  const accts=[
    {email:'refki@kelas.com',pw:'Refki123',name:'Bapak Refki',role:'teacher'},
    {email:'anjany@kelas.com',pw:'Anjany123',name:'Anjany',role:'student'},
    {email:'windi@kelas.com',pw:'Windi123',name:'Windi',role:'student'},
    {email:'rifka@kelas.com',pw:'Rifka123',name:'Rifka',role:'student'},
    {email:'adiva@kelas.com',pw:'Adiva123',name:'Adiva',role:'student'},
    {email:'adzkia@kelas.com',pw:'Adzkia123',name:'Adzkia',role:'student'},
    {email:'ileana@kelas.com',pw:'Ileana123',name:'Ileana',role:'student'}
  ];
  const sec=firebase.initializeApp(firebaseConfig,'seed'+Date.now());
  let made=0,exist=0;
  for(const a of accts){
    try{
      const cred=await sec.auth().createUserWithEmailAndPassword(a.email,a.pw);
      await sec.firestore().collection("users").doc(cred.user.uid).set({name:a.name,email:a.email,role:a.role,createdAt:Date.now(),done:{},scores:{},drills:{}},{merge:true});
      await sec.auth().signOut();made++;
    }catch(e){if(e.code==='auth/email-already-in-use')exist++;else console.warn('seed',a.email,e.message);}
  }
  try{await sec.delete();}catch(e){}
  const msg=`Selesai. Dibuat: ${made} akun baru, ${exist} sudah ada.`;
  console.log(msg);alert(msg);
}
window.seedDemo=seedDemo;

/* ============ BOOTSTRAP ============ */
function initApp(){
  if(!firebaseConfig.apiKey||firebaseConfig.apiKey.indexOf('PASTE')===0){
    document.body.classList.add('pre-auth');
    $("#authcard").innerHTML='<div class="logo">T</div><h2>Konfigurasi diperlukan</h2><p class="sub">Firebase belum dikonfigurasi. Tempel config proyek Anda ke dalam file (bagian <code>firebaseConfig</code>).</p>';
    return;
  }
  firebase.initializeApp(firebaseConfig);
  auth=firebase.auth();db=firebase.firestore();
  loginScreen();
  auth.onAuthStateChanged(u=>{ if(u)onLogin(u); else loginScreen(); });
}
